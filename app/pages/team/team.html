<ion-navbar *navbar>
  <ion-title>Team</ion-title>
</ion-navbar>

<ion-content padding class="p-team">

  <ion-spinner [hidden]="dataLoaded"></ion-spinner>

<ion-list>
  <button ion-item class="p-team__item" *ngFor="#item of team.data" (click)="itemSelected(item)">
    <ion-avatar item-left>
      <img *ngIf="item.acf.image" src="{{item.acf.image.sizes.thumbnail}}" class="p-team__image">
    </ion-avatar>
    <h2 [innerHTML]="item.title.rendered" class="p-team__title"></h2>
    <p class="p-team__sub">#{{item.acf.number}} - {{item.acf.position}}</p>
  </button>
</ion-list>


  
</ion-content>
