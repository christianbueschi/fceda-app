<ion-navbar *navbar>
  <ion-title>Team</ion-title>
</ion-navbar>

<ion-content padding class="team">

  <ion-spinner [hidden]="dataLoaded"></ion-spinner>

  <ion-list>
    <ion-item *ngFor="#item of team.data" (click)="itemSelected(item)">
      <ion-avatar item-left>
        <img *ngIf="item.acf.image" src="{{item.acf.image.sizes.thumbnail}}">
      </ion-avatar>
    <h2 [innerHTML]="item.title.rendered"></h2>
    <p>#{{item.acf.number}} - {{item.acf.position}}</p>
  </ion-item>
</ion-list>


  
</ion-content>
